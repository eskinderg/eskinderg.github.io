<div id="main-wrapper" #mainWrapper (scroll)="scrollService.updateScroll($event)">
    <app-right />

    <app-tracker [position]="scrollService.scrollPosition.value" />

    <app-loader [Loading]="httpStatus" />

    <app-color-picker />

    <app-outline (mouseWheelScroll)="onScroll($event)" />

    <app-dynamic-wrapper ngSkipHydration />

    <app-back-top [position]="200" />
</div>
