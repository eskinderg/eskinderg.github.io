<div
    appTooltip="{{ languageService.texts.menu.tooltip }}"
    color="primary"
    class="menu-button menu-toggle"
    [class.open]="visible"
    [class.btn-shadow]="visible"
    (click)="toggleMenu()"
    (window:scroll)="onScroll($event)">
    <svg version="1.1" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle class="svg-circle" cx="12" cy="12" r="11" fill="none" stroke="white" stroke-width=".4" />
        <rect
            class="line top"
            x="6.3096"
            y="6.8857"
            width="5.6904"
            height="1.5"
            rx="0"
            style="fill: #ffffff; stroke-width: 0.7663" />
        <rect
            class="line middle"
            x="6.3096"
            y="11.294"
            width="8.4324"
            height="1.5"
            rx="0"
            style="fill: #ffffff; stroke-width: 0.7663" />
        <rect
            class="line bottom"
            x="6.3096"
            y="15.701"
            width="11.381"
            height="1.5"
            rx="0"
            style="fill: #ffffff; stroke-width: 0.7663" />
    </svg>
</div>

<div class="menu-fullscreen" [class.open]="visible">
    <div class="menu-list">
        <nav>
            @for (item of languageService.texts.menu.list; track item) {
                <span
                    class="link"
                    [style.font-family]="languageService.texts.font.menu"
                    (mousemove)="onHover(item.link)"
                    (mouseout)="onMouseOut()"
                    (click)="scrollTo(item.link)"
                    ><span class="text"> {{ item.name }}</span></span
                >
                <hr />
            }
        </nav>
    </div>
</div>
