<div class="theme-toggle-wrapper" [class.open]="open">
    <button
        [appTooltip]="'Dark mode'"
        class="theme-toggle-main-btn"
        [ngClass]="{ rotate: open }"
        (click)="toggleOpen()"
        aria-label="Theme settings">
        <svg version="1.1" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle class="svg-circle" cx="12" cy="12" r="11" fill="none" stroke="#fff" stroke-width=".4" />
            <circle class="circle-menu" cx="12" cy="12" r="6.4243" fill="none" style="stroke-width: 0.4" />
            <path
                d="m12 5.5762a6.4243 6.4243 0 00-6.4238 6.4238 6.4243 6.4243 0 006.4238 6.4238z"
                style="fill: var(--primary); stroke-width: 0.80733" />
            <path
                d="m12 5.5762v12.848a6.4243 6.4243 0 006.4238-6.4238 6.4243 6.4243 0 00-6.4238-6.4238z"
                style="fill: #ffffff; stroke-width: 0.80733" />
        </svg>
    </button>
    <div class="theme-toggle-group icon-only" [class.open]="open">
        <button
            [appTooltip]="'system'"
            class="theme-toggle-btn"
            [class.active]="themeService.ThemeMode === 'system'"
            (click)="setMode('system'); close()"
            aria-label="Use system theme">
            <svg fill="white" version="1.1" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="m12 2.0977a10.005 10.005 0 00-9.875 8.3984h-1.7207l2.9805 5.1602 2.9785-5.1602h-1.7266a7.5379 7.5379 0 017.3633-5.9316 7.5379 7.5379 0 015.0352 1.9297l1.9863-1.5195a10.005 10.005 0 00-7.0215-2.877zm0 5.7188-1.2285 2.4922-2.75.39844 1.9902 1.9395-.4707 2.7383 2.459-1.293 2.459 1.293-.4707-2.7383 1.9902-1.9395-2.75-.39844-1.2285-2.4922zm8.6191.73047-2.9785 5.1602h1.7246a7.5379 7.5379 0 01-7.3652 5.9336 7.5379 7.5379 0 01-5.0605-1.9512l-1.9824 1.5176a10.005 10.005 0 007.043 2.8984 10.005 10.005 0 009.875-8.3984h1.7246l-2.9805-5.1602zm-8.6172 2.4707a1.0841 1.0841 0 011.084 1.084 1.0841 1.0841 0 01-1.084 1.084 1.0841 1.0841 0 01-1.084-1.084 1.0841 1.0841 0 011.084-1.084z" />
            </svg>
        </button>
        <button
            [appTooltip]="'light'"
            class="theme-toggle-btn"
            [class.active]="themeService.ThemeMode === 'light'"
            (click)="setMode('light'); close()"
            aria-label="Use light theme">
            <svg version="1.1" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    fill="white"
                    d="m11.949.76367c-.59735 1.6e-7-1.082.48468-1.082 1.082v3.4512h2.2656v-3.4512c2e-6-.59735-.48468-1.082-1.082-1.082h-.10156zm-8.6875 5.0332c-.38357-.0099621-.76146.18536-.9668.54102l-.050781.087891c-.29868.51732-.12084 1.1798.39648 1.4785l2.9883 1.7246 1.1328-1.9609-2.9883-1.7266c-.16166-.093336-.33737-.14-.51172-.14453zm17.477 0c-.17435.0045282-.35006.051195-.51172.14453l-2.9883 1.7266 1.1328 1.9609 2.9883-1.7246c.51732-.29868.69516-.96119.39648-1.4785l-.050781-.087891c-.20534-.35566-.58323-.55098-.9668-.54102zm-8.7383 1.4531c-2.6145 1e-7-4.75 2.1355-4.75 4.75 3e-7 2.6145 2.1355 4.75 4.75 4.75 2.6145 0 4.75-2.1355 4.75-4.75 0-2.6145-2.1355-4.75-4.75-4.75zm-6.3711 7.1211-2.9883 1.7246c-.51732.29868-.69516.9612-.39648 1.4785l.050781.08789c.29868.51732.96119.69516 1.4785.39648l2.9883-1.7266-1.1328-1.9609zm12.742 0-1.1328 1.9609 2.9883 1.7266c.51732.29868 1.1798.12084 1.4785-.39648l.050781-.08789c.29868-.51732.12084-1.1798-.39648-1.4785l-2.9883-1.7246zm-7.5039 4.332v3.4512c-2e-6.59735.48468 1.082 1.082 1.082h.10156c.59735 0 1.082-.48468 1.082-1.082v-3.4512h-2.2656z" />
            </svg>
        </button>
        <button
            [appTooltip]="'dark'"
            class="theme-toggle-btn"
            [class.active]="themeService.ThemeMode === 'dark'"
            (click)="setMode('dark'); close()"
            aria-label="Use dark theme">
            <svg width="24" height="24" viewBox="0 0 48 48" id="b">
                <defs>
                    <style>
                        .c {
                            stroke-linecap: round;
                            stroke-linejoin: round;
                        }
                    </style>
                </defs>
                <path
                    fill="white"
                    class="c"
                    d="m32.8,29.3c-8.9-.8-16.2-7.8-17.5-16.6-.3-1.8-.3-3.7,0-5.4.2-1.4-1.4-2.3-2.5-1.6C6.3,9.7,2.1,16.9,2.5,25c.5,10.7,9,19.5,19.7,20.4,10.6.9,19.8-6,22.5-15.6.4-1.4-1-2.6-2.3-2-2.9,1.3-6.1,1.8-9.6,1.5Z" />
            </svg>
        </button>
    </div>
</div>
