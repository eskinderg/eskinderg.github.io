@if (type === 'education') {
    <div class="education">
        <div class="logo">
            @if (item.img === 'bg-graduation') {
                <svg
                    class="education-logo bg-graduation"
                    version="1.0"
                    viewBox="0 0 1280 1225"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        fill="var(--light)"
                        d="m639.7.099609c-.1 0-128.7 60.7-285.7 134.9l-285.5 134.9-.30029 21.999-.20068 22.1h572 572l-.2007-22.1-.2988-21.999-285.8-135c-157.1-74.2-285.8-134.9-286-134.8zm.49951 334.1c-369.6-.2-461.4 9e-5-461.7 1.1001-.3.6-.40029 17.001-.30029 36.201l.30029 35h461.5 461.5v-36-36l-461.3-.30029zm-419.1 92.801-.50098 3.1992c-.3 1.8-.99961 25.8-1.5996 53.3s-1.4995 66.6-1.9995 87c-.5 20.3-1.401 55.4-2.001 78-.6 22.5-1.4995 58.8-1.9995 80.5s-1.3995 57.9-1.9995 80.5c-.6 22.5-1.501 57.6-2.001 78-.5 20.3-1.2996 51.3-1.5996 68.7l-.70019 31.8h67.301 67.2l-.60059-16.8c-.6-13.2-15.599-538-15.599-542.9 0-1-10-1.2993-52-1.2993h-51.899zm244.1 0-.60058 10.2c-.3 5.7-.99961 30.8-1.5996 55.8s-1.501 62.599-2.001 83.499-1.3995 56.3-1.9995 78.7c-.5 22.5-1.4995 58.9-1.9995 81-5 196.9-6 238.2-6 244.5v7.3008h66.999 67v-3.3003c0-2.7-3.7995-137.3-7.9995-281.7-.6-19.5-1.501-50.801-2.001-69.501-.6-18.7-1.9-66-3-105-1-39.1-2.2001-77.9-2.6001-86.3l-.59912-15.199h-51.8-51.8zm244 0-.59912 16.2c-.6 14.1-13.601 534.6-13.601 542v2.8008h67 67v-3.7998c.1-8.6-15.101-539.5-15.601-548l-.60058-9.1992h-51.8-51.8zm243.8 0v3.1992c0 1.8-.7 29.2-1.5 60.8-1.6 60.9-1.6995 67.4-6.4995 258-.5 22-1.3995 58.001-1.9995 80.001-.5 22-1.401 58.1-2.001 80.2-.5 22.2-1.1996 48.999-1.5996 59.499l-.60058 19.301h67.1 67.1v-5.2998c.1-10.5-15.099-549.3-15.599-552.5l-.501-3.1992h-51.899-52z" />
                </svg>
            } @else {
                <div class="education-logo" [ngClass]="item.img" alt="education logo"></div>
            }
        </div>

        <div class="ed-content" [style.font-family]="lang.texts.font.content">
            <h3 class="h3 title">
                {{ item.title }}
            </h3>
            <div class="education-subtitle content text">
                {{ item.subtitle }}
            </div>
            <div class="year content text">
                {{ item.year }}
            </div>
        </div>

        @if (type === 'conference') {
            <div class="conferences">
                <h3 class="h3 title">
                    {{ item.year }}
                </h3>
                @for (conference of item.list; track conference) {
                    <div class="conference">
                        {{ conference }}
                    </div>
                }
            </div>
        }
    </div>
}
