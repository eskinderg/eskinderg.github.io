<div class="lang-menu-wrapper">
    <div (click)="onClick()" appTooltip="{{ languageService.texts.languageSelect }}" class="lang-select">
        <svg
            width="24"
            height="24"
            class="svg"
            version="1.1"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path
                d="m7.1193 6.4303v.80805c0 .63793.15951 1.1128.47848 1.4247.32606.30479.81157.46784 1.4566.48911l-1.9988 4.8589h1.0739l1.3003-3.2417c.263.13074.50294.30756.71985.53048.26226.25517.47843.60248.64855 1.0419.1772.43238.28354.98882.31898 1.6693h.96753c-.063791-.89311-.20908-1.6161-.43591-2.169-.22682-.55997-.51392-.9959-.86124-1.3078-.30386-.27854-.64162-.48641-1.0133-.62361l.64119-1.5986h-1.244c-.36858 0-.64147-.077952-.81867-.2339-.1772-.15594-.26584-.46429-.26584-.92502v-.72296zm7.5466 4.6763-2.2484 6.8816h.82915l.77056-2.4093h2.2581l.76081 2.4093h.8389l-2.2484-6.8816zm.47796.92668.90225 2.8482h-1.7996z"
                fill="#fff"
                stroke-width="4.1441" />
            <circle class="svg-circle" cx="12" cy="12" r="11" fill="none" stroke="#fff" stroke-width=".4" />
        </svg>
    </div>

    <div class="lang-menu" [ngClass]="{ 'show-lang-drop-menu': visible }">
        @for (lang of languageService.LanguageList; track lang) {
            <div class="lang-menu-item">
                <div
                    class="lang-text"
                    [class.selected]="lang.code === this.languageService.Language"
                    (click)="changeLanguage(lang.code)"
                    [style.font-family]="lang.font.body">
                    {{ lang.title }}
                </div>
            </div>
        }
    </div>
</div>
