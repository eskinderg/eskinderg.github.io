<div class="lang-menu-wrapper">
    <div
        [class.scale]="visible"
        (click)="onClick()"
        appTooltip="{{ languageService.texts.languageSelect }}"
        class="lang-select">
        <svg class="svg" version="1.1" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle class="svg-circle" cx="12" cy="12" r="11" fill="none" stroke="#fff" stroke-width=".4" />
            <path
                d="m13.051 5.2461c1.4924 1.0714 2.5809 2.5794 3.1211 4.2832h2.2891c-.89632-2.2793-2.9595-3.9127-5.4102-4.2832zm-2.1055.00195c-2.4487.37147-4.51 2.0038-5.4062 4.2812h2.2891c.53886-1.7032 1.626-3.2097 3.1172-4.2812zm1.5527.018013v4.2632h2.6094c-.50197-1.3455-1.4061-3.2601-2.6094-4.2632zm-1 .00223c-1.2021 1.0031-2.1048 2.9165-2.6055 4.2611h2.6055zm-6.1328 4.7611c-.19543.63916-.29479 1.3031-.29492 1.9707.0001282.66758.099491 1.3315.29492 1.9707v-.5h2.2148c-.087624-.48007-.13283-.97124-.13281-1.4688-.0001664-.49881.04488-.9913.13281-1.4727h-2.2148zm13.27 0v.5h-2.2129c.08817.48135.1329.97384.13281 1.4727-6.4e-5.49752-.04495.98869-.13281 1.4688h2.2129v.5c.19543-.63916.29479-1.3031.29492-1.9707-.000128-.66758-.09949-1.3315-.29492-1.9707zm-10.033.5c-.10189.47884-.15446.9717-.1543 1.4727-1.99e-5.49967.052772.9912.1543 1.4688h2.8965v-2.9414zm3.8965 0v2.9414h2.9023c.1018-.47757.15423-.96911.1543-1.4688 8.2e-5-.50092-.05213-.99378-.1543-1.4727zm-6.959 3.9414c.89621 2.2774 2.9575 3.9097 5.4062 4.2812-1.4914-1.0716-2.5785-2.5779-3.1172-4.2812zm3.3535 0c.50054 1.3446 1.403 3.2578 2.6055 4.2609v-4.2609zm3.6055 0v4.2632c1.2037-1.0033 2.1075-2.9176 2.6094-4.2632zm3.6738 0c-.54007 1.7039-1.6285 3.2118-3.1211 4.2832 2.4507-.37054 4.5139-2.0039 5.4102-4.2832z"
                style="
                    fill: #ffffff;
                    paint-order: stroke fill markers;
                    stroke-dashoffset: 1028.4;
                    stroke-width: 2;
                " />
        </svg>
    </div>

    <div class="lang-menu" [ngClass]="{ 'show-lang-drop-menu': visible }">
        @for (lang of languageService.LanguageList; track lang) {
            <div class="lang-menu-item">
                <div
                    class="lang-text"
                    [class.selected]="lang.code === this.languageService.Language"
                    (click)="changeLanguage(lang.code)"
                    [style.font-family]="lang.font.body">
                    {{ lang.title }}
                </div>
            </div>
        }
    </div>
</div>
