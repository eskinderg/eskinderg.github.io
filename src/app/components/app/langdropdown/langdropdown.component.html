<div class="lang-menu-wrapper">
    <div
        [class.scale]="visible"
        (click)="onClick()"
        appTooltip="{{ languageService.texts.languageSelect }}"
        class="lang-select">
        <svg class="svg" version="1.1" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle class="svg-circle" cx="12" cy="12" r="11" fill="none" stroke="#fff" stroke-width=".4" />
            <path
                d="m10.507 5.3361c-1.7836.39989-3.3326 1.4977-4.3008 3.0481h2.7854c.31554-1.1608.80796-2.2223 1.5154-3.0481zm2.9859 0c.70745.82582 1.1999 1.8873 1.5154 3.0481h2.7854c-.96822-1.5504-2.5172-2.6482-4.3008-3.0481zm-1.4929.0021738c-.37019.45418-.71045 2.3727-.98665 3.0459h1.9733c-.27618-.6732-.61641-2.5917-.98665-3.0459zm-6.262 3.9341c-.37599.8617-.57011 1.7917-.57022 2.7319.0001118.94016.19423 1.8702.57022 2.7319v-.88125h2.9116c-.07535-.61446-.11054-1.237-.11059-1.8506 4.47e-5-.61355.035238-1.2361.11059-1.8506h-2.9116zm12.524 0v.88125h-2.9116c.07535.61448.11054 1.2371.11059 1.8506-4.3e-5.61358-.03524 1.2362-.11059 1.8506h2.9116v.88125c.37599-.8617.57011-1.7917.57022-2.7319-.000112-.94015-.19423-1.8702-.57022-2.7319zm-7.774.88125c-.11538.59236-.17966 1.2153-.1797 1.8506 4.5e-5.63535.06433 1.2583.1797 1.8506h3.0239c.11537-.59235.17966-1.2153.17971-1.8506-4.6e-5-.63536-.06433-1.2583-.17971-1.8506zm-4.2818 5.4707c.96862 1.5508 2.5183 2.6486 4.3026 3.0481-.7076-.82583-1.2011-1.8873-1.5171-3.0481zm4.8071 0c.2762.67319.61646 2.7306.98665 3.1848.37024-.45417.71047-2.5116.98665-3.1848zm3.995 0c-.31605 1.1608-.80952 2.2222-1.5171 3.0481 1.7842-.39946 3.3339-1.4973 4.3026-3.0481z"
                style="fill: #ffffff; paint-order: stroke fill markers" />
        </svg>
    </div>

    <div class="lang-menu" [ngClass]="{ 'show-lang-drop-menu': visible }">
        @for (lang of languageService.LanguageList; track lang) {
            <div class="lang-menu-item">
                <div
                    class="lang-text"
                    [class.selected]="lang.code === this.languageService.Language"
                    (click)="changeLanguage(lang.code)"
                    [style.font-family]="lang.font.body">
                    {{ lang.title }}
                </div>
            </div>
        }
    </div>
</div>
